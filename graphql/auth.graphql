type AuthPayload {
    ok: Boolean
    token: String!
    user: User!
    token_type: String
    expires_at: DateTime
}

type LogoutResponse {
    message: String!
}

extend type Query {
    me: User! @auth(guards: ["api"])
}

type Mutation {
    #    Authentication
    login(
        email: String!
        password: String!
    ): AuthPayload!
    logout: LogoutResponse
}
